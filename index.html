
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>재하의 푸드매니저</title>
<style>
:root{
--bg:#F7F4EE;
--card:#fff;
--line:#E6E0D5;
--theme:#A7BFA1;
--text:#2C2C2C;
--sub:#777;
--danger:#D75D5D;
}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Pretendard,sans-serif}
body{margin:0;background:var(--bg);color:var(--text);padding-bottom:100px}
header{position:sticky;top:0;background:#fff;padding:14px;border-bottom:1px solid var(--line);z-index:10}
h1{margin:0 0 4px;font-size:26px}
.top{display:flex;justify-content:space-between;align-items:flex-start}
.info{font-size:12px;color:var(--theme);font-weight:700}
.today{font-size:12px;color:var(--sub)}
.tabs{display:flex;gap:8px;overflow:auto;margin-top:12px}
.tab{padding:10px 14px;border-radius:12px;background:#ECE7DD;border:1px solid var(--line);white-space:nowrap}
.tab.active{background:var(--theme);color:#fff}
.container{padding:14px}
.page{display:none}
.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}
.card-title{font-size:20px;font-weight:800;margin-bottom:12px}
input,select,textarea{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;font-size:16px;background:#fff}
button{width:100%;padding:14px;border:none;border-radius:14px;background:var(--theme);color:#fff;font-weight:700;font-size:16px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.stock-item{padding:12px 0;border-top:1px solid #eee}
.stock-item:first-child{border-top:none}
.food-name{font-weight:800;font-size:17px;margin-bottom:4px}
.food-meta{font-size:13px;color:var(--sub);line-height:1.5}
.old{color:var(--danger);font-weight:700}
.memo{margin-top:6px;background:#F7F4EF;padding:8px;border-radius:10px;font-size:12px}
.small{padding:8px;font-size:12px}
.gray{background:#999}
.red{background:var(--danger)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{padding:8px 10px;border-radius:999px;background:#EEE7DD;font-size:12px}
.chip.active{background:var(--theme);color:#fff}
</style>
</head>
<body>

<header>
<div class="top">
<div>
<h1 id="title">재하의 푸드매니저</h1>
<div class="today" id="today"></div>
</div>
<div class="info" id="info"></div>
</div>

<div class="tabs">
<div class="tab active" onclick="changeTab('stock',this)">냉동재고</div>
<div class="tab" onclick="changeTab('todayPage',this)">오늘기록</div>
<div class="tab" onclick="changeTab('shopping',this)">장보기</div>
<div class="tab" onclick="changeTab('setting',this)">설정</div>
</div>
</header>

<div class="container">

<section class="page active" id="stock">
<div class="card">
<div class="card-title">재고 추가</div>

<input id="foodName" placeholder="재료명">

<select id="foodCategory">
<option>단백질</option>
<option>열매채소</option>
<option>잎채소</option>
<option>간식</option>
</select>

<div class="row">
<input id="foodCount" type="number" placeholder="수량">
<input id="foodDate" type="date">
</div>

<textarea id="foodMemo" placeholder="메모 / 알레르기"></textarea>

<button onclick="addStock()">재고 추가</button>
</div>

<div class="card">
<div class="card-title">현재 재고</div>
<div id="stockList"></div>
</div>
</section>

<section class="page" id="todayPage">
<div class="card">
<div class="card-title">오늘 기록</div>

<select id="mealType">
<option>아침</option>
<option>점심</option>
<option>저녁</option>
<option>간식</option>
</select>

<div class="chips" id="chips"></div>

<input id="directFood" placeholder="재고에 없으면 직접 입력">
<textarea id="todayMemo" placeholder="메모"></textarea>

<button onclick="saveMeal()">오늘 기록 저장</button>
</div>

<div class="card">
<div class="card-title">오늘 기록 목록</div>
<div id="todayList"></div>
</div>
</section>

<section class="page" id="shopping">
<div class="card">
<div class="card-title">장보기</div>
<input id="shoppingInput" placeholder="장볼 재료">
<button onclick="addShopping()">추가</button>
</div>

<div class="card">
<div class="card-title">장보기 리스트</div>
<div id="shoppingList"></div>
</div>
</section>

<section class="page" id="setting">
<div class="card">
<div class="card-title">아기 정보</div>

<input id="babyName" placeholder="이름">

<div class="row">
<input id="babyHeight" placeholder="키">
<input id="babyWeight" placeholder="몸무게">
</div>

<input id="babyBirth" type="date">

<button onclick="saveBaby()">저장</button>
</div>

<div class="card">
<div class="card-title">백업</div>
<button onclick="backup()">백업 복사</button>
<textarea id="restoreInput" placeholder="백업 데이터 붙여넣기"></textarea>
<button onclick="restore()">복원하기</button>
</div>
</section>

</div>

<script>
let data = JSON.parse(localStorage.getItem('bfm_working')) || {
baby:{
name:'재하',
height:'77.8',
weight:'11.9',
birth:'2025-05-12'
},
stocks:[],
today:[],
shopping:[]
};

let selected=[];

function save(){
localStorage.setItem('bfm_working',JSON.stringify(data));
}

function init(){

document.getElementById('title').innerText =
`${data.baby.name}의 푸드매니저`;

const now = new Date();

document.getElementById('today').innerText =
now.toLocaleDateString('ko-KR',{
year:'numeric',
month:'2-digit',
day:'2-digit',
weekday:'long'
});

const d = Math.floor((now - new Date(data.baby.birth))/(1000*60*60*24));

document.getElementById('info').innerText =
`D+${d} · ${data.baby.height}cm · ${data.baby.weight}kg`;

document.getElementById('babyName').value=data.baby.name;
document.getElementById('babyHeight').value=data.baby.height;
document.getElementById('babyWeight').value=data.baby.weight;
document.getElementById('babyBirth').value=data.baby.birth;

document.getElementById('foodDate').value =
new Date().toISOString().split('T')[0];

renderStocks();
renderToday();
renderShopping();
renderChips();
}

function changeTab(id,el){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

function addStock(){

const name=document.getElementById('foodName').value.trim();
const category=document.getElementById('foodCategory').value;
const count=Number(document.getElementById('foodCount').value);
const date=document.getElementById('foodDate').value;
const memo=document.getElementById('foodMemo').value;

if(!name){alert('재료명 입력!');return;}
if(!count || count<1){alert('수량 입력!');return;}

data.stocks.push({
id:Date.now(),
name,
category,
count,
date,
memo
});

save();

document.getElementById('foodName').value='';
document.getElementById('foodCount').value='';
document.getElementById('foodMemo').value='';

renderStocks();
renderChips();

alert('재고 추가 완료!');
}

function renderStocks(){

const list=document.getElementById('stockList');

if(data.stocks.length===0){
list.innerHTML='<div class="food-meta">재고 없음</div>';
return;
}

list.innerHTML='';

data.stocks.slice().reverse().forEach(item=>{

const diff=Math.floor((new Date()-new Date(item.date))/(1000*60*60*24));

list.innerHTML += `
<div class="stock-item">

<div class="food-name">${item.name}</div>

<div class="food-meta">
${item.category} · ${item.count}개 ·
${diff>=14 ? `<span class="old">냉동 ${diff}일째</span>` : `냉동 ${diff}일째`}
</div>

${item.memo ? `<div class="memo">${item.memo}</div>` : ''}

<div class="row" style="margin-top:8px">
<button class="small" onclick="useFood(${item.id})">사용</button>
<button class="small gray" onclick="editFood(${item.id})">수정</button>
<button class="small red" onclick="deleteFood(${item.id})">삭제</button>
</div>

</div>
`;

});

}

function renderChips(){

const wrap=document.getElementById('chips');
wrap.innerHTML='';

data.stocks.forEach(item=>{

if(item.count>0){

wrap.innerHTML += `
<div class="chip" onclick="toggleChip('${item.name}',this)">
${item.name}
</div>
`;

}

});

}

function toggleChip(name,el){

if(selected.includes(name)){
selected=selected.filter(x=>x!==name);
el.classList.remove('active');
}else{
selected.push(name);
el.classList.add('active');
}

}

function saveMeal(){

const meal=document.getElementById('mealType').value;
const direct=document.getElementById('directFood').value.trim();
const memo=document.getElementById('todayMemo').value;

let foods=[...selected];

if(direct){
foods.push(direct);
}

if(foods.length===0){
alert('음식 선택!');
return;
}

data.today.push({
date:new Date().toISOString().split('T')[0],
meal,
foods,
memo
});

foods.forEach(food=>{

const stock=data.stocks.find(x=>x.name===food);

if(stock && stock.count>0){
stock.count -=1;
}

});

save();

selected=[];

document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));

document.getElementById('todayMemo').value='';
document.getElementById('directFood').value='';

renderToday();
renderStocks();
renderChips();

alert('저장 완료!');
}

function renderToday(){

const list=document.getElementById('todayList');

if(data.today.length===0){
list.innerHTML='<div class="food-meta">기록 없음</div>';
return;
}

list.innerHTML='';

data.today.slice().reverse().forEach(item=>{

list.innerHTML += `
<div class="stock-item">
<div class="food-name">${item.meal}</div>
<div class="food-meta">${item.foods.join(' · ')}</div>
${item.memo ? `<div class="memo">${item.memo}</div>` : ''}
</div>
`;

});

}

function addShopping(){

const value=document.getElementById('shoppingInput').value.trim();

if(!value)return;

data.shopping.push(value);

save();

document.getElementById('shoppingInput').value='';

renderShopping();
}

function renderShopping(){

const list=document.getElementById('shoppingList');

if(data.shopping.length===0){
list.innerHTML='<div class="food-meta">장보기 없음</div>';
return;
}

list.innerHTML='';

data.shopping.forEach(item=>{

list.innerHTML += `
<div class="stock-item">
<div class="food-name">🛒 ${item}</div>
</div>
`;

});

}

function saveBaby(){

data.baby.name=document.getElementById('babyName').value;
data.baby.height=document.getElementById('babyHeight').value;
data.baby.weight=document.getElementById('babyWeight').value;
data.baby.birth=document.getElementById('babyBirth').value;

save();
init();

alert('저장 완료!');
}

function deleteFood(id){
data.stocks=data.stocks.filter(x=>x.id!==id);
save();
renderStocks();
renderChips();
}

function editFood(id){

const item=data.stocks.find(x=>x.id===id);
if(!item)return;

const name=prompt('재료명',item.name);
if(!name)return;

item.name=name;

save();
renderStocks();
renderChips();
}

function useFood(id){

const item=data.stocks.find(x=>x.id===id);
if(!item)return;

item.count -=1;

if(item.count<=0){
deleteFood(id);
}else{
save();
renderStocks();
renderChips();
}

}

function backup(){
navigator.clipboard.writeText(JSON.stringify(data));
alert('복사 완료!');
}

function restore(){

const value=document.getElementById('restoreInput').value;

if(!value)return;

data=JSON.parse(value);

save();
init();

alert('복원 완료!');
}

window.changeTab=changeTab;
window.addStock=addStock;
window.saveMeal=saveMeal;
window.toggleChip=toggleChip;
window.addShopping=addShopping;
window.saveBaby=saveBaby;
window.deleteFood=deleteFood;
window.editFood=editFood;
window.useFood=useFood;
window.backup=backup;
window.restore=restore;

init();
</script>

</body>
</html>
