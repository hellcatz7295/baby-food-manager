<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Food Manager</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:linear-gradient(#ecf8ff,#fff);
color:#333;
}
.app{
max-width:480px;
margin:0 auto;
padding:16px 16px 100px;
}
.card{
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 8px 24px rgba(30,100,150,.08);
margin-bottom:12px;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
width:54px;
height:54px;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
background:linear-gradient(135deg,#dff4ff,#dbeafe);
}
.brand{
display:flex;
gap:12px;
align-items:center;
}
h1{
margin:0;
font-size:22px;
}
.muted{
font-size:13px;
color:#8a96a3;
}
.dday{
background:#e0f2fe;
padding:12px;
border-radius:18px;
font-weight:800;
color:#0369a1;
font-size:13px;
}
.tabs{
display:flex;
gap:8px;
overflow:auto;
padding:8px 0 16px;
}
.tab{
border:0;
background:#fff;
padding:10px 15px;
border-radius:16px;
font-weight:800;
white-space:nowrap;
box-shadow:0 4px 14px rgba(0,0,0,.06);
}
.active{
background:#38bdf8;
color:#fff;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:14px;
}
.num{
font-size:24px;
font-weight:900;
margin-top:6px;
}
.item{
background:#fff;
padding:16px;
border-radius:24px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
margin-bottom:12px;
}
.row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}
.title{
font-size:18px;
font-weight:900;
}
.info{
margin-top:12px;
padding:12px;
border-radius:18px;
background:#f0f9ff;
}
.btn{
border:0;
padding:10px 14px;
border-radius:16px;
font-weight:800;
}
.blue{
background:#38bdf8;
color:#fff;
}
.red{
background:#fb7185;
color:#fff;
}
input,select,textarea{
width:100%;
padding:14px;
border-radius:18px;
border:1px solid #dbeafe;
margin-bottom:10px;
font-size:16px;
}
textarea{
min-height:90px;
}
.float{
position:fixed;
right:20px;
bottom:20px;
width:68px;
height:58px;
border-radius:999px;
border:0;
font-size:20px;
font-weight:900;
background:linear-gradient(90deg,#38bdf8,#3b82f6);
color:#fff;
box-shadow:0 10px 24px rgba(59,130,246,.35);
}
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:none;
align-items:flex-end;
}
.modal.show{
display:flex;
}
.sheet{
background:#fff;
width:100%;
max-width:480px;
margin:0 auto;
padding:20px;
border-radius:32px 32px 0 0;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}
.day{
background:#f0f9ff;
border-radius:14px;
padding:8px;
text-align:center;
font-size:12px;
}
.bar{
height:12px;
background:#e0f2fe;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}
.bar span{
display:block;
height:100%;
background:linear-gradient(90deg,#38bdf8,#3b82f6);
}
</style>
</head>

<body>

<div class="app">

<div class="card header">
<div class="brand">
<div class="logo">🍼</div>
<div>
<h1>Baby Food Manager</h1>
<div class="muted" id="today"></div>
</div>
</div>

<div class="dday" id="dday"></div>
</div>

<div class="grid">
<div class="card">
<div class="muted">전체 재고</div>
<div class="num" id="countInventory">0</div>
</div>

<div class="card">
<div class="muted">오늘 기록</div>
<div class="num" id="countLogs">0</div>
</div>

<div class="card">
<div class="muted">오래된 냉동</div>
<div class="num" id="countOld">0</div>
</div>
</div>

<div class="tabs" id="tabs"></div>

<div id="content"></div>

</div>

<button class="float" onclick="openModal()">+ 추가</button>

<div class="modal" id="modal">
<div class="sheet">

<h2>재고 추가</h2>

<input id="foodName" placeholder="음식 이름">

<select id="foodCategory">
<option>반찬</option>
<option>간식</option>
<option>국</option>
<option>큐브</option>
</select>

<input id="foodAmount" type="number" placeholder="수량">

<button class="btn blue" onclick="saveFood()">저장</button>

</div>
</div>

<script>

const birth = new Date('2025-05-12');

let activeTab='냉동재고';

let inventory = JSON.parse(localStorage.getItem('inventory')||'[]');

const tabs=['냉동재고','식단표','추천음식','기록','통계'];

function save(){
localStorage.setItem('inventory',JSON.stringify(inventory));
}

function formatDate(){
const d=new Date();
return `${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function dday(){
return Math.floor((new Date()-birth)/86400000);
}

function render(){

save();

document.getElementById('today').innerText=`재하 이유식 관리앱 · ${formatDate()}`;
document.getElementById('dday').innerText=`재하 D+${dday()}`;

document.getElementById('countInventory').innerText=inventory.length;

document.getElementById('countLogs').innerText=0;

document.getElementById('countOld').innerText=inventory.filter(i=>i.days>=14).length;

document.getElementById('tabs').innerHTML=tabs.map(tab=>`
<button class="tab ${activeTab===tab?'active':''}" onclick="changeTab('${tab}')">
${tab}
</button>
`).join('');

if(activeTab==='냉동재고'){
renderInventory();
}

if(activeTab==='통계'){
renderStats();
}

}

function changeTab(tab){
activeTab=tab;
render();
}

function renderInventory(){

document.getElementById('content').innerHTML=inventory.length?inventory.map(item=>`
<div class="item">

<div class="row">
<div>
<div class="title">${item.name}</div>
<div class="muted">${item.category}</div>
</div>

<div>
<button class="btn red" onclick="deleteFood(${item.id})">삭제</button>
</div>
</div>

<div class="info row">
<div>
<div class="muted">냉동 보관</div>
<div>${formatDate()} (냉동 ${item.days}일째)</div>
</div>

<div>
<div class="muted">남은 수량</div>
<div class="title">${item.amount}</div>
</div>
</div>

</div>
`).join(''):`
<div class="card" style="text-align:center">
🧊<br><br>
아직 재고가 없어요
</div>
`;

}

function renderStats(){

document.getElementById('content').innerHTML=`
<div class="card">
<h2>성장 기록</h2>

<div>
<div class="row">
<div>26.05.09</div>
<div>11.9kg · 77.8cm</div>
</div>

<div class="bar">
<span style="width:83%"></span>
</div>
</div>

</div>
`;

}

function openModal(){
document.getElementById('modal').classList.add('show');
}

function saveFood(){

const name=document.getElementById('foodName').value;

if(!name){
alert('이름 입력해줘!');
return;
}

inventory.unshift({
id:Date.now(),
name,
category:document.getElementById('foodCategory').value,
amount:Number(document.getElementById('foodAmount').value||0),
days:0
});

document.getElementById('modal').classList.remove('show');

document.getElementById('foodName').value='';
document.getElementById('foodAmount').value='';

render();

}

function deleteFood(id){

if(confirm('삭제할까?')){
inventory=inventory.filter(i=>i.id!==id);
render();
}

}

render();

</script>

</body>
</html>
