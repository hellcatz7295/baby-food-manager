
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Food Manager</title>
<style>
body{font-family:sans-serif;background:#f7f4ee;margin:0;padding:0;color:#333}
header{background:#fff;padding:14px;position:sticky;top:0;border-bottom:1px solid #ddd}
.tabs{display:flex;gap:6px;overflow:auto;margin-top:10px}
.tab{padding:8px 12px;background:#ece7dd;border-radius:10px;font-size:13px}
.tab.active{background:#a7bfa1;color:#fff}
.container{padding:12px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border:1px solid #e6e0d5;border-radius:14px;padding:14px;margin-bottom:12px}
input,select,textarea,button{width:100%;padding:11px;border-radius:10px;border:1px solid #ddd;margin-bottom:8px;box-sizing:border-box}
button{background:#a7bfa1;color:#fff;border:none;font-weight:bold}
.stock-item{padding:10px 0;border-top:1px solid #eee}
.stock-item:first-child{border-top:none}
.row{display:flex;gap:6px}
.row>*{flex:1}
.food-name{font-weight:bold}
.food-meta{font-size:12px;color:#666}
.calendar-day{padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>

<header>
<h2>재하의 푸드매니저</h2>

<div class="tabs">
<div class="tab active" onclick="changeTab('stock',this)">재고</div>
<div class="tab" onclick="changeTab('today',this)">오늘기록</div>
<div class="tab" onclick="changeTab('calendar',this)">달력</div>
</div>
</header>

<div class="container">

<section class="page active" id="stock">
<div class="card">
<h3>재고 추가</h3>

<input id="foodName" placeholder="재료명">
<div class="row">
<input id="foodCount" type="number" placeholder="수량">
<input id="foodDate" type="date">
</div>

<button onclick="addStock()">재고 추가</button>
</div>

<div class="card">
<h3>현재 재고</h3>
<div id="stockList"></div>
</div>
</section>

<section class="page" id="today">
<div class="card">
<h3>오늘 기록</h3>

<select id="mealType">
<option>아침</option>
<option>점심</option>
<option>저녁</option>
<option>간식</option>
</select>

<input id="todayFood" placeholder="먹은 음식">

<textarea id="todayMemo" placeholder="메모"></textarea>

<button onclick="saveMeal()">오늘 기록 저장</button>
</div>

<div class="card">
<h3>오늘 기록 목록</h3>
<div id="todayList"></div>
</div>
</section>

<section class="page" id="calendar">
<div class="card">
<h3>달력 기록</h3>
<div id="calendarList"></div>
</div>
</section>

</div>

<script>

let data = JSON.parse(localStorage.getItem('bfm_real')) || {
stocks:[],
records:[]
};

function save(){
localStorage.setItem('bfm_real',JSON.stringify(data));
}

function changeTab(id,el){

document.querySelectorAll('.page').forEach(x=>{
x.classList.remove('active');
});

document.querySelectorAll('.tab').forEach(x=>{
x.classList.remove('active');
});

document.getElementById(id).classList.add('active');
el.classList.add('active');

}

function addStock(){

const name = document.getElementById('foodName').value;
const count = Number(document.getElementById('foodCount').value);
const date = document.getElementById('foodDate').value;

if(!name || !count){
alert('입력 확인!');
return;
}

data.stocks.push({
id:Date.now(),
name,
count,
date
});

save();
renderStocks();

document.getElementById('foodName').value='';
document.getElementById('foodCount').value='';

}

function renderStocks(){

const list = document.getElementById('stockList');

if(data.stocks.length===0){
list.innerHTML='재고 없음';
return;
}

list.innerHTML='';

data.stocks.forEach(item=>{

const diff = Math.floor(
(new Date()-new Date(item.date))
/(1000*60*60*24)
);

list.innerHTML += `
<div class="stock-item">
<div class="food-name">${item.name}</div>
<div class="food-meta">${item.count}개 · 냉동 ${diff}일째</div>
</div>
`;

});

}

function saveMeal(){

const meal = document.getElementById('mealType').value;
const food = document.getElementById('todayFood').value;
const memo = document.getElementById('todayMemo').value;

if(!food){
alert('음식 입력!');
return;
}

data.records.push({
date:new Date().toISOString().split('T')[0],
meal,
food,
memo
});

save();

renderToday();
renderCalendar();

document.getElementById('todayFood').value='';
document.getElementById('todayMemo').value='';

}

function renderToday(){

const today = new Date().toISOString().split('T')[0];

const list = document.getElementById('todayList');

const records = data.records.filter(x=>x.date===today);

if(records.length===0){
list.innerHTML='오늘 기록 없음';
return;
}

list.innerHTML='';

records.forEach(item=>{

list.innerHTML += `
<div class="stock-item">
<div class="food-name">${item.meal}</div>
<div class="food-meta">${item.food}</div>
<div class="food-meta">${item.memo}</div>
</div>
`;

});

}

function renderCalendar(){

const list = document.getElementById('calendarList');

if(data.records.length===0){
list.innerHTML='기록 없음';
return;
}

list.innerHTML='';

data.records.slice().reverse().forEach(item=>{

list.innerHTML += `
<div class="calendar-day">
<div><b>${item.date}</b></div>
<div>${item.meal} · ${item.food}</div>
</div>
`;

});

}

document.getElementById('foodDate').value =
new Date().toISOString().split('T')[0];

renderStocks();
renderToday();
renderCalendar();

</script>

</body>
</html>
